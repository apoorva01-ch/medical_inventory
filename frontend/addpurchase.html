<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Purchase</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e0f7f6, #f4f9f9);
}

.top-border {
    height: 6px;
    background: linear-gradient(to right, #2c5352, #497379, #6fb1a0);
}

.top-navbar {
    background: linear-gradient(to right, #2c5352, #497379);
    color: white;
    padding: 15px 25px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.top-navbar .brand {
    font-weight: 600;
    font-size: 20px;
}

.logout-btn {
    background: white;
    color: #2c5352;
    border-radius: 8px;
    border: none;
    padding: 6px 14px;
    font-weight: 500;
}

.sidebar {
    height: 100vh;
    background: linear-gradient(to bottom, #2c5352, #3f6f73);
    padding-top: 20px;
}

.sidebar a {
    color: #e0f2f1;
    padding: 12px 20px;
    display: block;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover,
.sidebar a.active {
    background: rgba(255,255,255,0.18);
    color: white;
    border-left: 4px solid #a7ffeb;
}

.content-area {
    padding: 30px;
}

.custom-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 28px;
    border: 1px solid rgba(44, 83, 82, 0.25);
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.head {
    color: #2c5352;
}

.btn-primary {
    background: linear-gradient(to right, #2c5352, #497379);
    border: none;
}
</style>
</head>

<body>

<div class="top-border"></div>

<div class="top-navbar d-flex justify-content-between align-items-center">
    <div class="brand">
        <i class="bi bi-hospital"></i> Medical Inventory Management System
    </div>
    <div>
        Welcome, Admin
        <button class="logout-btn ms-3">
            <a href="loginpg.html" style="text-decoration:none;color:#2c5352;">Logout</a>
        </button>
    </div>
</div>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar p-0">
    <a href="medicine.html"><i class="bi bi-capsule me-2"></i>Medicines</a>
    <a href="suppliers.html"><i class="bi bi-truck me-2"></i>Suppliers</a>
    <a href="stock.html" class="active"><i class="bi bi-box-arrow-in-down me-2"></i>Stock In</a>
    <a href="sales.html"><i class="bi bi-cart me-2"></i>Sales</a>
    <a href="viewstock.html"><i class="bi bi-box-seam me-2"></i>View Stock</a>
</div>

<!-- Content -->
<div class="col-md-10 content-area">

<h3 class="head mb-4">Add New Purchase</h3>

<div class="custom-card">
<form id="purchaseForm">

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Medicine Name</label>
            <input type="text" class="form-control" id="medicine" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Supplier</label>
            <input type="text" class="form-control" id="supplier" required>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">Batch Number</label>
            <input type="text" class="form-control" id="batch" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Expiry Date</label>
            <input type="date" class="form-control" id="expiry" required>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" id="quantity" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Purchase Price</label>
            <input type="number" class="form-control" id="price" required>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">
        <i class="bi bi-save"></i> <a href="stockin.html" style="color: white;text-decoration: none;">Save Purchase</a>
    </button>

    <a href="stockin.html" class="btn btn-secondary ms-2">
        Cancel
    </a>

</form>
</div>

</div>
</div>
</div>

<script>
document.getElementById("purchaseForm").addEventListener("submit", function(e){
    e.preventDefault();

    let purchaseData = {
        medicine: document.getElementById("medicine").value,
        supplier: document.getElementById("supplier").value,
        batch: document.getElementById("batch").value,
        expiry: document.getElementById("expiry").value,
        quantity: document.getElementById("quantity").value,
        price: document.getElementById("price").value
    };

    let purchases = JSON.parse(localStorage.getItem("purchases")) || [];
    purchases.push(purchaseData);
    localStorage.setItem("purchases", JSON.stringify(purchases));

    window.location.href = "stock.html";
});
</script>

</body>
</html>
